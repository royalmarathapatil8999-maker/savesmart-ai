<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaveSmart AI Demo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body{margin:0;padding:0;font-family:sans-serif;background:linear-gradient(135deg,#050810,#1a1f3a);color:#fff;}
.page{display:none;opacity:0;transition:opacity 0.5s;}
.page.active{display:block;opacity:1;}
.container{padding-top:80px;text-align:center;}
.btn{padding:0.8rem 1.5rem;margin:0.5rem;border:none;border-radius:10px;cursor:pointer;}
.btn-primary{background:linear-gradient(135deg,#6B5EFF,#5147D6);color:#fff;}
input{padding:0.7rem 1rem;border-radius:8px;border:1px solid #555;background:rgba(255,255,255,0.05);color:#fff;margin-bottom:1rem;width:90%;}
.dashboard-content{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin-top:1rem;}
.stat-card{background:rgba(255,255,255,0.05);padding:1rem;border-radius:12px;width:250px;}
.chat-panel{background:rgba(255,255,255,0.05);padding:1rem;border-radius:12px;width:300px;height:300px;display:flex;flex-direction:column;}
.chat-messages{flex:1;overflow-y:auto;margin-bottom:0.5rem;}
.message{padding:0.5rem 0.7rem;border-radius:10px;margin:0.3rem 0;}
.message.user{background:#6B5EFF;text-align:right;}
.message.ai{background:rgba(107,94,255,0.2);}
.chat-input{display:flex;gap:0.5rem;}
.chat-input input{flex:1;}
</style>
</head>
<body>

<div class="container">

<!-- LANDING -->
<section id="landing" class="page active">
  <h1>Welcome to SaveSmart AI</h1>
  <p>Manage your finances with AI insights!</p>
  <button class="btn btn-primary" id="getStartedBtn">Get Started</button>
</section>

<!-- LOGIN -->
<section id="login" class="page">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" placeholder="Email" required><br>
    <input type="password" placeholder="Password" required><br>
    <button class="btn btn-primary" type="submit">Login</button>
  </form>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
  <h2>Dashboard</h2>
  <div class="dashboard-content">
    <div class="stat-card">
      <h3>Total Savings</h3>
      <canvas id="savingsChart"></canvas>
    </div>
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Ask me...">
        <button class="btn btn-primary" id="sendBtn">Send</button>
      </div>
    </div>
  </div>
</section>

</div>

<script>
// PAGE SWITCH
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
document.getElementById('getStartedBtn').addEventListener('click',()=>showPage('login'));
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  showPage('dashboard');
});

// CHART
const ctx=document.getElementById('savingsChart').getContext('2d');
new Chart(ctx,{type:'line',data:{labels:['Jan','Feb','Mar','Apr','May','Jun'],datasets:[{label:'Savings',data:[5000,7000,8000,10000,12000,12345],borderColor:'#6B5EFF',backgroundColor:'rgba(107,94,255,0.2)',fill:true,tension:0.4}]},options:{responsive:true,plugins:{legend:{display:false}}}});

// CHAT
const chatInput=document.getElementById('chatInput');
document.getElementById('sendBtn').addEventListener('click',sendMsg);
function sendMsg(){
  const text=chatInput.value.trim(); if(!text)return;
  const chat=document.getElementById('chatMessages');
  const userMsg=document.createElement('div'); userMsg.className='message user'; userMsg.innerText=text;
  chat.appendChild(userMsg);
  chatInput.value='';
  chat.scrollTop=chat.scrollHeight;
  setTimeout(()=>{const aiMsg=document.createElement('div'); aiMsg.className='message ai'; aiMsg.innerText=`AI: I understood "${text}"`; chat.appendChild(aiMsg); chat.scrollTop=chat.scrollHeight;},500);
}
</script>
</body>
</html>
