<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaveSmart AI Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{min-height:100vh;background:#0b0e14;color:#fff;overflow:hidden;display:flex;justify-content:center;align-items:center;}
.glow{position:absolute;width:400px;height:400px;background:radial-gradient(circle,#1f7cff55,transparent 70%);top:-150px;left:-150px;animation:float1 12s infinite alternate;}
.glow.r{bottom:-150px;right:-150px;top:auto;left:auto;animation:float2 15s infinite alternate;}
@keyframes float1{0%{transform:translate(0,0)}100%{transform:translate(100px,120px)}}
@keyframes float2{0%{transform:translate(0,0)}100%{transform:translate(-120px,-100px)}}

.dashboard{
  width:95%;
  max-width:960px;
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:20px;
  z-index:10;
}

.panel{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  border-radius:22px;
  padding:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h1{font-size:1.8rem;margin-bottom:8px}
p{opacity:.75;font-size:.95rem;margin-bottom:20px}

.status-card{
  background:rgba(255,255,255,.1);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.quick-chips{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:12px;
}
.quick-chips button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}
.quick-chips button:hover{transform:scale(1.05);}

.chat{
  background:rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  height:50vh;
  display:flex;
  flex-direction:column;
}
.messages{flex:1;overflow-y:auto;margin-bottom:8px;}
.msg{padding:10px 14px;border-radius:14px;margin-bottom:8px;animation:pop .25s ease;}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1}}
.bot{background:rgba(255,255,255,.14)}
.user{background:#1f7cff;align-self:flex-end;color:#fff;}
input{padding:10px;border-radius:12px;border:none;outline:none;width:100%;margin-top:6px;}
</style>
</head>
<body>

<div class="glow"></div>
<div class="glow r"></div>

<div class="dashboard">
  <!-- LEFT PANEL -->
  <div class="panel">
    <h1>💸 SaveSmart AI</h1>
    <p>Personal AI Finance Dashboard (Demo Mode)</p>
    <div class="status-card"><b>Monthly Income:</b> ₹50,000</div>
    <div class="status-card"><b>Current Savings:</b> ₹12,500</div>
    <div class="status-card"><b>Goal:</b> Bike in 6 months</div>

    <div class="quick-chips">
      <button onclick="quick('Optimize my budget')">Budget</button>
      <button onclick="quick('Savings Tips')">Save More</button>
      <button onclick="quick('Investment Plan')">Invest</button>
      <button onclick="quick('Pro Unlock')">Pro</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel chat">
    <h1>🤖 AI Advisor</h1>
    <div class="messages" id="msgs">
      <div class="msg bot">Hello! I’m your finance AI. Ask me anything 💰</div>
    </div>
    <input id="text" placeholder="Type your query..." onkeydown="if(event.key==='Enter')send()">
  </div>
</div>

<script>
const msgs=document.getElementById("msgs");
const text=document.getElementById("text");

function quick(t){add(t,'user');thinking();}
function send(){
  if(!text.value.trim())return;
  add(text.value,'user');
  text.value='';
  thinking();
}

function thinking(){
  const t=document.createElement('div');
  t.className='msg bot';
  t.innerText='Analyzing...';
  msgs.appendChild(t);
  msgs.scrollTop=msgs.scrollHeight;
  setTimeout(()=>{t.innerText=reply()},900);
}

function reply(){
  const r=[
    "You can save ₹5,500/month by adjusting food & transport.",
    "Investing ₹2,000/month in SIP could grow your wealth.",
    "Follow 50-30-20 budgeting for better savings.",
    "Upgrade to Pro to unlock full analytics dashboard."
  ];
  return r[Math.floor(Math.random()*r.length)];
}

function add(t,c){
  const d=document.createElement('div');
  d.className='msg '+c;
  d.innerText=t;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}
</script>

</body>
</html>
