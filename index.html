<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SaveSmart AI - Your Premium Personal Finance AI Assistant">
<meta name="theme-color" content="#6B5EFF">
<title>SaveSmart AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ===== ROOT COLORS ===== */
:root {
  --primary: #6B5EFF; --primary-dark: #5147D6; --primary-light: #8B7FFF;
  --secondary: #FF6B9D; --success: #00D9A3; --danger: #FF6B6B;
  --dark: #0A0E27; --darker: #050810; --light: #F5F7FA; --border: #1F2937;
  --text-primary:#FFFFFF; --text-secondary:#B4B9C8;
  --glass-bg: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1);
}
/* ===== BODY ===== */
body {margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: linear-gradient(135deg,var(--darker)0%,#1a1f3a100%); color:var(--text-primary);}
.bg-glow{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(80px);opacity:0.15;pointer-events:none;z-index:0;}
.glow-1{background:var(--primary);top:-50%;left:-10%;animation:float 15s ease-in-out infinite;}
.glow-2{background:var(--secondary);bottom:-30%;right:-5%;animation:float 20s ease-in-out infinite reverse;}
.glow-3{background:var(--primary-light);top:50%;right:-15%;animation:float 18s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(50px,50px) scale(1.1);}}

/* ===== PAGE ===== */
.page{display:none;opacity:0;animation:fadeIn 0.6s forwards;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ===== NAVBAR ===== */
.navbar{position:fixed;top:0;width:100%;background:rgba(10,14,39,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;padding:1rem 2rem;}
.navbar-content{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-buttons{display:flex;gap:1rem;}
.btn{padding:0.75rem 1.5rem;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.5s ease;}
.btn:hover::before{left:100%;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;}
.btn-secondary{background:var(--glass-bg);color:var(--primary-light);border:1px solid var(--glass-border);}

/* ===== LANDING ===== */
.landing{padding-top:80px;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
.hero-badge{display:inline-block;background:rgba(107,94,255,0.1);border:1px solid var(--primary-light);padding:0.5rem 1.2rem;border-radius:50px;margin-bottom:2rem;font-size:0.85rem;}

/* ===== LOGIN ===== */
.login-container{padding-top:80px;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{width:100%;max-width:420px;padding:0 2rem;}
.login-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:20px;padding:3rem 2rem;backdrop-filter:blur(20px);}
.login-header{text-align:center;margin-bottom:2.5rem;}
.form-group{margin-bottom:1.5rem;}
.form-group input{width:100%;padding:0.85rem 1rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);}
.form-group input:focus{outline:none;border-color:var(--primary);}

/* ===== DASHBOARD ===== */
.dashboard{padding-top:80px;padding-bottom:2rem;min-height:100vh;}
.dashboard-content{max-width:1400px;margin:0 auto;padding:0 2rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.stat-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:15px;padding:1.5rem;backdrop-filter:blur(10px);}
.chart-container{position:relative;height:250px;}
.chat-section{margin-top:1rem;}
.chat-panel{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:20px;padding:1rem;display:flex;flex-direction:column;height:300px;}
.chat-messages{flex:1;overflow-y:auto;margin-bottom:0.5rem;}
.message{display:flex;gap:0.5rem;}
.message.user{justify-content:flex-end;}
.message-content{max-width:70%;background:rgba(107,94,255,0.1);border:1px solid var(--glass-border);border-radius:12px;padding:0.5rem 0.8rem;}
.message.user .message-content{background:rgba(107,94,255,0.2);border-color:var(--primary);}
.chat-input{display:flex;gap:0.5rem;}
.chat-input input{flex:1;padding:0.5rem;border:1px solid var(--border);border-radius:8px;}
</style>
</head>
<body>

<!-- BACKGROUND GLOWS -->
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>
<div class="bg-glow glow-3"></div>

<div class="container">

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-content">
    <div class="logo">SaveSmart</div>
    <div class="nav-buttons">
      <button class="btn btn-primary" onclick="showPage('landing')">Home</button>
      <button class="btn btn-secondary" onclick="showPage('login')">Login</button>
      <button class="btn btn-secondary" onclick="showPage('dashboard')">Dashboard</button>
    </div>
  </div>
</nav>

<!-- LANDING PAGE -->
<section id="landing" class="page active landing">
  <div class="hero">
    <div class="hero-badge">AI Personal Finance</div>
    <h1>Welcome to SaveSmart AI</h1>
    <p>Manage your finances intelligently with AI-powered insights.</p>
    <button class="btn btn-primary" onclick="showPage('login')">Get Started</button>
  </div>
</section>

<!-- LOGIN PAGE -->
<section id="login" class="page login-container">
  <div class="login-box">
    <div class="login-card">
      <div class="login-header">
        <h2>Login</h2>
        <p>Access your dashboard</p>
      </div>
      <form onsubmit="login(event)">
        <div class="form-group">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </div>
  </div>
</section>

<!-- DASHBOARD PAGE -->
<section id="dashboard" class="page dashboard">
  <div class="dashboard-content">
    <div class="stat-card">
      <div>Total Savings: $12,345</div>
      <div class="chart-container">
        <canvas id="savingsChart"></canvas>
      </div>
    </div>
    <div class="chat-section">
      <div class="chat-panel">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Ask me anything...">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>
</section>

</div>

<script>
// PAGE TOGGLE
function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

// LOGIN DUMMY
function login(e){
  e.preventDefault();
  alert("Login successful!");
  showPage('dashboard');
}

// CHART.JS
const ctx=document.getElementById('savingsChart').getContext('2d');
new Chart(ctx,{type:'line',data:{labels:['Jan','Feb','Mar','Apr','May','Jun'],datasets:[{label:'Savings',data:[5000,7000,8000,10000,12000,12345],borderColor:'#6B5EFF',backgroundColor:'rgba(107,94,255,0.2)',fill:true,tension:0.4}]},options:{responsive:true,plugins:{legend:{display:false}}}});

// CHAT DUMMY
function sendMessage(){
  const input=document.getElementById('chatInput');
  const message=input.value.trim();
  if(!message) return;
  const chat=document.getElementById('chatMessages');
  const userMsg=document.createElement('div'); userMsg.classList.add('message','user');
  userMsg.innerHTML=`<div class="message-content">${message}</div>`;
  chat.appendChild(userMsg);
  input.value=''; chat.scrollTop=chat.scrollHeight;
  setTimeout(()=>{const aiMsg=document.createElement('div'); aiMsg.classList.add('message'); aiMsg.innerHTML=`<div class="message-content">AI Response: I understood "${message}"</div>`; chat.appendChild(aiMsg); chat.scrollTop=chat.scrollHeight;},800);
}
</script>
</body>
</html>
