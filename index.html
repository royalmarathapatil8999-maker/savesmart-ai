<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaveSmart AI - Personal Finance Assistant</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React & ReactDOM -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel (for JSX) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { background-color: #FDFBF7; font-family: sans-serif; }
.custom-scrollbar::-webkit-scrollbar { width: 6px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background-color: #E7E5E4; border-radius: 20px; }
.animate-fade-in { animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform:translateY(0);} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { Home, PieChart, MessageSquare, Target, CreditCard, Crown, TrendingUp, TrendingDown, Plus, ArrowRight, ShieldCheck, Zap, Lock, Menu, X, Send, User, Bot } = lucide;

// Mock data
const INITIAL_TRANSACTIONS = [
{ id:1, title:'Freelance Project', amount:45000, type:'income', category:'Salary', date:'2023-10-25' },
{ id:2, title:'Grocery Run', amount:3200, type:'expense', category:'Food', date:'2023-10-26' },
{ id:3, title:'Netflix Subscription', amount:649, type:'expense', category:'Entertainment', date:'2023-10-27' },
{ id:4, title:'Uber Rides', amount:1500, type:'expense', category:'Transport', date:'2023-10-28' },
{ id:5, title:'Stock Dividend', amount:1200, type:'income', category:'Investment', date:'2023-10-29' },
];

// Simple Card
const Card = ({ children, className="" }) => <div className={`bg-white rounded-3xl shadow-sm border border-stone-100 p-6 ${className}`}>{children}</div>;

function App() {
  const [activeView, setActiveView] = useState('dashboard');
  const [transactions, setTransactions] = useState(INITIAL_TRANSACTIONS);
  const [messages, setMessages] = useState([{ role:'ai', text:"Hello! I'm SaveSmart AI. How can I assist you today?" }]);
  const [inputMessage, setInputMessage] = useState("");
  const [isTyping, setIsTyping] = useState(false);
  const chatEndRef = useRef(null);

  const totalIncome = transactions.filter(t => t.type==='income').reduce((a,c)=>a+c.amount,0);
  const totalExpense = transactions.filter(t => t.type==='expense').reduce((a,c)=>a+c.amount,0);
  const currentBalance = totalIncome - totalExpense;

  const scrollToBottom = () => chatEndRef.current?.scrollIntoView({behavior:"smooth"});
  useEffect(()=>{ scrollToBottom(); }, [messages, isTyping, activeView]);

  const handleSendMessage = () => {
    if(!inputMessage.trim()) return;
    const userText = inputMessage;
    setMessages(prev=>[...prev,{role:'user', text:userText}]);
    setInputMessage(""); setIsTyping(true);

    setTimeout(()=>{
      let aiResponse = "I'm noting that. Want help with budget, transactions, or goals?";
      const text = userText.toLowerCase();
      if(text.includes("income")||text.includes("expense")) aiResponse = `Your total income: ₹${totalIncome}, expenses: ₹${totalExpense}.`;
      else if(text.includes("premium")||text.includes("upgrade")) aiResponse = "Upgrade to Premium for full analytics.";
      setMessages(prev=>[...prev,{role:'ai', text:aiResponse}]); setIsTyping(false);
    },1200);
  };

  const DashboardView = () => (
    <div className="p-6 space-y-6 animate-fade-in">
      <h2 className="text-2xl font-bold">Overview</h2>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <Card>
          <p>Total Balance</p>
          <h3 className="text-2xl font-bold">₹ {currentBalance}</h3>
        </Card>
        <Card>
          <p>Total Income</p>
          <h3 className="text-2xl font-bold">₹ {totalIncome}</h3>
        </Card>
        <Card>
          <p>Total Expenses</p>
          <h3 className="text-2xl font-bold">₹ {totalExpense}</h3>
        </Card>
      </div>
    </div>
  );

  const ChatView = () => (
    <div className="flex flex-col h-screen p-6">
      <div className="flex-1 overflow-y-auto space-y-4 custom-scrollbar">
        {messages.map((msg,i)=>(
          <div key={i} className={`flex ${msg.role==='user'?'justify-end':'justify-start'}`}>
            <div className={`p-3 rounded-xl ${msg.role==='user'?'bg-stone-800 text-white':'bg-white text-stone-700 border border-stone-200'}`}>{msg.text}</div>
          </div>
        ))}
        {isTyping && <div className="flex justify-start p-3"><span className="animate-bounce mr-1">●</span><span className="animate-bounce mr-1 delay-100">●</span><span className="animate-bounce delay-200">●</span></div>}
        <div ref={chatEndRef}></div>
      </div>
      <div className="flex mt-2 gap-2">
        <input 
          type="text" 
          placeholder="Ask about finances..."
          className="flex-1 border border-stone-300 p-2 rounded-xl"
          value={inputMessage}
          onChange={e=>setInputMessage(e.target.value)}
          onKeyDown={e=>e.key==='Enter' && handleSendMessage()}
        />
        <button onClick={handleSendMessage} className="bg-stone-800 text-white px-4 py-2 rounded-xl">Send</button>
      </div>
    </div>
  );

  return (
    <div>
      <nav className="flex gap-4 p-4 bg-stone-100">
        <button onClick={()=>setActiveView('dashboard')} className="px-3 py-1 bg-white rounded-lg shadow">Dashboard</button>
        <button onClick={()=>setActiveView('chat')} className="px-3 py-1 bg-white rounded-lg shadow">Chat</button>
      </nav>
      {activeView==='dashboard' ? <DashboardView/> : <ChatView/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
