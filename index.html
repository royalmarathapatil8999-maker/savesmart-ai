<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaveSmart AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
  min-height:100vh;
  background:#050505;
  overflow:hidden;
  color:white;
}

/* BLOBS */
.blob{
  position:absolute;
  width:300px;
  height:300px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  filter:blur(120px);
  animation:move 12s infinite alternate;
}
.blob.one{top:-100px;left:-100px}
.blob.two{bottom:-120px;right:-120px;animation-delay:3s}

@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(200px,150px)}
}

/* LANDING */
.section{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity .6s,transform .6s;
}
.hidden{
  opacity:0;
  pointer-events:none;
  transform:scale(1.05);
}

.card{
  width:90%;
  max-width:420px;
  padding:30px;
  border-radius:22px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  text-align:center;
}

h1{
  font-size:1.8rem;
  margin-bottom:10px;
}
p{
  font-size:.95rem;
  opacity:.85;
  margin-bottom:25px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:1rem;
  font-weight:600;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:.3s;
}
button:hover{transform:scale(1.05)}

input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:14px;
  border:none;
  outline:none;
}

/* CHAT */
.chat{
  display:flex;
  flex-direction:column;
  height:80vh;
}
.messages{
  flex:1;
  overflow-y:auto;
  margin-bottom:10px;
}
.msg{
  padding:12px 14px;
  border-radius:14px;
  margin-bottom:10px;
  max-width:80%;
}
.bot{background:rgba(255,255,255,.15)}
.user{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  align-self:flex-end;
}
</style>
</head>

<body>

<div class="blob one"></div>
<div class="blob two"></div>

<!-- LANDING -->
<div id="landing" class="section">
  <div class="card">
    <h1>💸 SaveSmart AI</h1>
    <p>Your personal AI to save money, track spending & build wealth.</p>
    <button onclick="goLogin()">Get Started Free</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="section hidden">
  <div class="card">
    <h1>Welcome Back 👋</h1>
    <p>Login to continue</p>
    <input placeholder="Email">
    <input placeholder="Password" type="password">
    <button onclick="goChat()">Login</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="section hidden">
  <div class="card chat">
    <h1>🤖 SaveSmart AI</h1>
    <div class="messages" id="msgs">
      <div class="msg bot">Hi! Ask me anything about saving money 💰</div>
    </div>
    <input id="text" placeholder="Type message..." onkeydown="if(event.key==='Enter')send()">
  </div>
</div>

<script>
const landing=document.getElementById('landing');
const login=document.getElementById('login');
const chat=document.getElementById('chat');
const msgs=document.getElementById('msgs');
const text=document.getElementById('text');

function goLogin(){
  landing.classList.add('hidden');
  login.classList.remove('hidden');
}
function goChat(){
  login.classList.add('hidden');
  chat.classList.remove('hidden');
}
function send(){
  if(!text.value.trim())return;
  add(text.value,'user');
  text.value='';
  setTimeout(()=>add("Real AI coming soon 😄",'bot'),700);
}
function add(t,c){
  const d=document.createElement('div');
  d.className='msg '+c;
  d.innerText=t;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}
</script>

</body>
  </html>
