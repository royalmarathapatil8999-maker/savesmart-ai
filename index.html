<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaveSmart AI - Cream Theme</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* BASE */
body {
    margin:0;
    padding:0;
    font-family:sans-serif;
    background: linear-gradient(135deg,#FFF8E7,#FFECD1);
    color: #333;
}
.page {display:none; opacity:0; transition:opacity 0.5s;}
.page.active {display:block; opacity:1;}
.container {padding-top:80px; text-align:center;}
h1,h2,h3,p{margin:0.5rem 0;}

/* BUTTONS */
.btn{padding:0.8rem 1.5rem;margin:0.5rem;border:none;border-radius:10px;cursor:pointer; transition:0.3s;}
.btn-primary{background: linear-gradient(135deg,#FFA94D,#FF7A00); color:#fff;}
.btn-primary:hover{transform:translateY(-2px); box-shadow:0 4px 15px rgba(255,122,0,0.4);}
.btn-secondary{background:#D8CFC4;color:#333;}
.btn-secondary:hover{background:#CFC2B3;}

/* INPUT */
input{padding:0.7rem 1rem;border-radius:8px;border:1px solid #ccc;background:#fff;color:#333;margin-bottom:1rem;width:90%;}
input:focus{outline:none;border-color:#FFA94D; box-shadow:0 0 10px rgba(255,122,0,0.2);}

/* DASHBOARD */
.dashboard-content{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin-top:1rem;}
.stat-card{background:#fff;padding:1rem;border-radius:12px;width:250px;box-shadow:0 4px 20px rgba(0,0,0,0.05);}
.chart-container{height:200px;}
.chat-panel{background:#fff;padding:1rem;border-radius:12px;width:300px;height:350px;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,0.05);}
.chat-messages{flex:1;overflow-y:auto;margin-bottom:0.5rem;}
.message{padding:0.5rem 0.7rem;border-radius:10px;margin:0.3rem 0;}
.message.user{background:#FFA94D;color:#fff;text-align:right;}
.message.ai{background:#FFE0B2;text-align:left;}
.chat-input{display:flex;gap:0.5rem;}
.chat-input input{flex:1;}

/* PAGE TRANSITIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="container">

<!-- LANDING -->
<section id="landing" class="page active">
  <h1>Welcome to SaveSmart AI</h1>
  <p>Manage your finances smartly!</p>
  <button class="btn btn-primary" id="getStartedBtn">Get Started</button>
</section>

<!-- LOGIN -->
<section id="login" class="page">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" placeholder="Email" required><br>
    <input type="password" placeholder="Password" required><br>
    <button class="btn btn-primary" type="submit">Login</button>
  </form>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
  <h2>Dashboard</h2>
  <div class="dashboard-content">
    <div class="stat-card">
      <h3>Total Savings</h3>
      <div class="chart-container">
        <canvas id="savingsChart"></canvas>
      </div>
    </div>
    <div class="stat-card">
      <h3>Monthly Income</h3>
      <p>$12,345</p>
    </div>
    <div class="stat-card">
      <h3>Monthly Expenses</h3>
      <p>$8,765</p>
    </div>
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Ask me...">
        <button class="btn btn-primary" id="sendBtn">Send</button>
      </div>
    </div>
  </div>
</section>

</div>

<script>
// PAGE SWITCH
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
document.getElementById('getStartedBtn').addEventListener('click',()=>showPage('login'));
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  showPage('dashboard');
});

// CHART
const ctx=document.getElementById('savingsChart').getContext('2d');
new Chart(ctx,{
  type:'line',
  data:{
    labels:['Jan','Feb','Mar','Apr','May','Jun'],
    datasets:[{
      label:'Savings',
      data:[5000,7000,8000,10000,12000,12345],
      borderColor:'#FF7A00',
      backgroundColor:'rgba(255,122,0,0.2)',
      fill:true,
      tension:0.4
    }]
  },
  options:{responsive:true,plugins:{legend:{display:false}}}
});

// CHAT
const chatInput=document.getElementById('chatInput');
document.getElementById('sendBtn').addEventListener('click',sendMsg);
chatInput.addEventListener('keypress',function(e){if(e.key==='Enter'){sendMsg();}});
function sendMsg(){
  const text=chatInput.value.trim(); if(!text)return;
  const chat=document.getElementById('chatMessages');
  const userMsg=document.createElement('div'); userMsg.className='message user'; userMsg.innerText=text;
  chat.appendChild(userMsg);
  chatInput.value='';
  chat.scrollTop=chat.scrollHeight;
  const typing=document.createElement('div'); typing.className='message ai'; typing.innerText='AI is typing...'; chat.appendChild(typing); chat.scrollTop=chat.scrollHeight;
  setTimeout(()=>{
    typing.innerText=`AI: I understood "${text}"`;
    chat.scrollTop=chat.scrollHeight;
  },700);
}
</script>

</body>
</html>
